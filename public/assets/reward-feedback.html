<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #000000;
            color: #dfe4ff;
            font-family: 'Inter', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="min-h-screen flex flex-col justify-between items-center overflow-hidden">
<header class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#a8d0b4]" data-icon="eco">eco</span>
<span class="text-xl font-bold tracking-tighter text-[#a8d0b4]">EcoSnap</span>
</div>
<div class="font-['Inter'] leading-relaxed tracking-tight text-[#E5E7EB] font-medium">
            2,450 pts
        </div>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-8 w-full max-w-md mx-auto">
<div class="relative w-full aspect-square flex items-center justify-center mb-12">
<div class="absolute inset-0 rounded-full bg-[#a8d0b4]/5 scale-150 blur-3xl"></div>
<div class="relative flex flex-col items-center text-center">
<div class="mb-8 p-6 rounded-full bg-surface-container-low border border-[#a8d0b4]/10">
<span class="material-symbols-outlined text-6xl text-[#a8d0b4]" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h1 class="text-5xl font-extrabold tracking-tighter text-[#a8d0b4] mb-4">
                    +30 EcoPoints
                </h1>
<p class="text-xl font-medium text-[#E5E7EB] tracking-wide opacity-90">
                    Good choice
                </p>
<div class="mt-12 grid grid-cols-2 gap-4 w-full opacity-60">
<div class="text-left border-l border-[#32457c]/20 pl-4">
<p class="text-[10px] uppercase tracking-widest text-[#98a093] mb-1">Impact</p>
<p class="text-sm font-semibold">0.4kg CO2 Saved</p>
</div>
<div class="text-left border-l border-[#32457c]/20 pl-4">
<p class="text-[10px] uppercase tracking-widest text-[#98a093] mb-1">Type</p>
<p class="text-sm font-semibold">Glass Recycle</p>
</div>
</div>
</div>
</div>
<div class="w-full space-y-4">
<button class="w-full h-14 bg-[#a8d0b4] text-black font-bold text-lg rounded-xl active:scale-95 duration-200 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="center_focus_strong">center_focus_strong</span>
                Scan Next
            </button>
<button class="w-full h-14 bg-transparent text-[#98a093] font-medium text-sm hover:text-[#a8d0b4] transition-colors duration-200">
                Back to Dashboard
            </button>
</div>
</main>
<section class="w-full px-8 pb-12 pt-8">
<div class="bg-surface-container rounded-2xl p-6 border border-[#32457c]/10">
<div class="flex items-center justify-between mb-4">
<h3 class="text-sm font-bold tracking-tight text-[#E5E7EB]">Next Milestone</h3>
<span class="text-xs font-medium text-[#a8d0b4]">75% Complete</span>
</div>
<div class="w-full h-1 bg-surface-container-highest overflow-hidden">
<div class="h-full bg-[#a8d0b4] w-3/4"></div>
</div>
<p class="mt-3 text-[10px] text-[#98a093] leading-relaxed">
                Earn 120 more points to unlock the "Eco Warrior" badge and 15% off at Sustainable Goods.
            </p>
</div>
</section>
<nav class="fixed bottom-0 w-full z-50 pb-safe bg-black/80 backdrop-blur-md flex justify-around items-center h-20 px-4 w-full border-t border-[#32457c]/15">
<button class="flex flex-col items-center justify-center text-[#a8d0b4] scale-110 transition-transform active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="center_focus_strong" style="font-variation-settings: 'FILL' 1;">center_focus_strong</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-wide uppercase mt-1">Scan</span>
</button>
<button class="flex flex-col items-center justify-center text-[#98a093] opacity-70 hover:opacity-100 transition-opacity active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="storefront">storefront</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-wide uppercase mt-1">Market</span>
</button>
<button class="flex flex-col items-center justify-center text-[#98a093] opacity-70 hover:opacity-100 transition-opacity active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="redeem">redeem</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-wide uppercase mt-1">Rewards</span>
</button>
<button class="flex flex-col items-center justify-center text-[#98a093] opacity-70 hover:opacity-100 transition-opacity active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-wide uppercase mt-1">Profile</span>
</button>
